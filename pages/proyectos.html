<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Proyectos - Ángel Portfolio</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/proyectos.css">
</head>
<body>
    <!-- Contenedor para la navegación -->
    <div id="nav-placeholder"></div>
    
    <script src="../scripts/main.js"></script>

    <!-- Contenedor principal -->
    <main class="project-container">
        <div class="window">
            <div class="control">Mis Proyectos</div>
            <div class="content">
                <h2 class="title">MIS PROYECTOS</h2>
                <div class="grid">
                    <div class="item">
                        <img src="../assets/img/tourner_logo.png" alt="Tourner">
                        <p>Tourner</p>
                    </div>
                    <div class="item">
                        <img src="../assets/img/hollejo_logo.png" alt="Hollejo">
                        <p>Hollejo</p>
                    </div>
                    <div class="item">
                        <img src="../assets/img/museo_logo.png" alt="Museo de la Cuchillería">
                        <p>Museo de la Cuchillería</p>
                    </div>
                    <div class="item">
                        <img src="../assets/img/arroz_logo.png" alt="Arroz de Calasparra">
                        <p>Arroz de Calasparra</p>
                    </div>
                    <div class="item">
                        <img src="../assets/img/fotos_logo.png" alt="Fotos, Cartelería e Ilustración">
                        <p>Fotos, Cartelería e Ilustración</p>
                    </div>
                    <div class="item">
                        <img src="../assets/img/videos_logo.png" alt="Vídeos">
                        <p>Vídeos</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../scripts/proyectos.js"></script>
</body>
</html>
